# set zsh as default shell
set-option -g default-shell /bin/zsh

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# tmux continuum
# to auto restore tmux sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-processes 'false'
set -g @resurrect-default-processes 'false'

# Move around panes with hjkl, as one would in vim after pressing ctrl + w
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-tmux-navigator: Ctrl+hjkl flows between nvim splits and tmux panes (no prefix)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# jump directly to pane by index, and keep pane numbers visible longer on prefix+q
set -g display-panes-time 4000

# always show pane index (and current command) on the pane border
set -g pane-border-status top
set -g pane-border-format " [#P] #{pane_current_command} "
bind 1 select-pane -t 1
bind 2 select-pane -t 2
bind 3 select-pane -t 3
bind 4 select-pane -t 4
bind 5 select-pane -t 5
bind 6 select-pane -t 6
bind 7 select-pane -t 7
bind 8 select-pane -t 8
bind 9 select-pane -t 9

# Move in terminal using vim keybinding
set-window-option mode-keys vi

# mouse mode
# enable mouse mode
set -g mouse on

# Notify when a process completes in another window
set-window-option -g visual-bell on
set-window-option -g bell-action other

#some key binding
#open tmux split screens in the current directory
bind - split-window -c "#{pane_current_path}" 
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}" 

# status line
# Set status bar
set -g status-left-length 50
set -g status-bg black
set -g status-fg gold
set -g status-left "#[bg=colour33,fg=white,bold]  #(echo '#S' | tr a-z A-Z)  #[bg=black,fg=colour33] "
set -g status-right '#[fg=green]Continuum status: #{continuum_status}'

# window name boxes: grey when inactive, green when active
set -g window-status-format         "#[bg=colour240,fg=white] #I:#W "
set -g window-status-current-format "#[bg=green,fg=black,bold] #I:#W "
set -g window-status-separator " "

# start window numbering from 1 instead of 0
set -g base-index 1

# panes start at 1 to match windows
setw -g pane-base-index 1

# renumber windows if a window is closed
set -g renumber-windows on

# kill the ~500ms Esc lag (matters in nvim)
set -s escape-time 0

# true color + 256 color so nvim themes render correctly inside tmux
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
# Switch to last active window
bind-key a last-window
# Switch to last active pane
bind-key / last-pane

# cycle windows without prefix: j=left, k=right
bind -n M-j previous-window
bind -n M-k next-window

#for easy reloading
bind R source-file ~/.tmux.conf

# fuzzy-find and switch to a window across all sessions
bind w display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | fzf --reverse | awk '{print \$1}' | xargs -r tmux switch-client -t"

# fuzzy-find and switch to a session
bind s display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse | xargs -r tmux switch-client -t"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

